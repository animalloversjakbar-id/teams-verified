<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Verifikasi ALJABAR</title>

<style>

h1{
    margin:0;
    color:#1e3a8a;
    font-size:32px;
    line-height:1.2;
}

.subtitle{
    font-size:16px;
    font-weight:400;
    color:#64748b;
}

  
  

body{
margin:0;
background:#f4f7fb;
font-family:Segoe UI,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:500px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.1);
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.valid{
color:#16a34a;
}

.invalid{
color:#dc2626;
}

.info{
margin-top:20px;
text-align:left;
}

.row{
padding:12px;
border-bottom:1px solid #eee;

}


.success-animation{
    text-align:center;
    margin-bottom:20px;
}


.checkmark{
    filter:
    drop-shadow(0 0 8px rgba(34,197,94,.5))
    drop-shadow(0 0 20px rgba(34,197,94,.3));
}
.checkmark{
    width:100px;
    height:100px;
    display:block;
    margin:0 auto 15px;
}

.checkmark-circle{
    stroke:#22c55e;
    stroke-width:2;
    stroke-miterlimit:10;
    stroke-dasharray:166;
    stroke-dashoffset:166;
    animation:stroke 0.8s ease forwards;
}

.checkmark-check{
    stroke:#22c55e;
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:48;
    stroke-dashoffset:48;
    animation:stroke 0.4s ease forwards 0.8s;
}

@keyframes stroke{
    to{
        stroke-dashoffset:0;
    }
}




.logo-container{
    text-align:center;
    margin-bottom:20px;
}

.logo-container img{
    width:120px;
    height:auto;
}
  

</style>

</head>

<body>

<div class="card">

<div class="logo-container">
    <img src="Logo Aljabar - Stoke.png" alt="Logo ALJABAR">
</div>
  
<h1>
    ALJABAR<br>
    <span class="subtitle">
        (Animal Lovers Jakarta Barat)
    </span>
</h1>

<div id="hasil">
Memverifikasi...
</div>

</div>

</script>

</body>
</html>
