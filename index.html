<script>

const api =
"https://script.google.com/macros/s/AKfycbwuCIi-40kfZDwvf0tC7M3E4Yl3g3S3HBcQG0ROEY9_JxBPl2BI_gzQrBDgIdz12E4owA/exec";

const params = new URLSearchParams(window.location.search);
const token = params.get("t");

console.log("Token:", token);

fetch(api + "?t=" + encodeURIComponent(token))
  .then(res => res.json())
  .then(data => {

    console.log(data);

    if (data.found) {

      document.getElementById("hasil").innerHTML = `
        <h2 class="valid">✅ Anggota Terverifikasi</h2>

        <div class="info">

          <div class="row">
            <b>Nama Anggota</b><br>
            ${data.nama}
          </div>

          <div class="row">
            <b>ID Anggota</b><br>
            ${data.id}
          </div>

          <div class="row">
            <b>Status</b><br>
            ${data.status}
          </div>

          <div class="row">
            <b>Waktu Verifikasi</b><br>
            ${new Date().toLocaleString('id-ID')}
          </div>

        </div>
      `;

    } else {

      document.getElementById("hasil").innerHTML = `
        <h2 class="invalid">❌ Tidak Terdaftar</h2>
        <p>Data anggota tidak ditemukan.</p>
      `;

    }

  })
  .catch(error => {

    console.error(error);

    document.getElementById("hasil").innerHTML = `
      <h2 class="invalid">❌ Gagal Terhubung ke Server</h2>
      <p>${error.message}</p>
    `;

  });

</script>
