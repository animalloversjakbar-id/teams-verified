<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALJABAR Verification Site</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f7fb;
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:550px;
    background:#ffffff;
    border-radius:24px;
    padding:40px;
    box-shadow:0 10px 40px rgba(0,0,0,.1);
}

.logo-container{
    text-align:center;
    margin-bottom:20px;
}

.logo-container img{
    width:120px;
    height:auto;
}

h1{
    text-align:center;
    color:#1e3a8a;
    line-height:1.2;
    margin-bottom:20px;
}

.subtitle{
    font-size:15px;
    color:#64748b;
    font-weight:400;
}

.valid{
    color:#16a34a;
}

.invalid{
    color:#dc2626;
}

.info{
    margin-top:20px;
}

.row{
    padding:12px 0;
    border-bottom:1px solid #e5e7eb;
}

.success-animation{
    text-align:center;
    margin-bottom:20px;
}

.checkmark{
    width:100px;
    height:100px;
    display:block;
    margin:0 auto 15px;

    filter:
    drop-shadow(0 0 8px rgba(34,197,94,.5))
    drop-shadow(0 0 20px rgba(34,197,94,.3));
}

.checkmark-circle{
    stroke:#22c55e;
    stroke-width:2;
    stroke-miterlimit:10;
    stroke-dasharray:166;
    stroke-dashoffset:166;
    animation:stroke .8s ease forwards;
}

.checkmark-check{
    stroke:#22c55e;
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:48;
    stroke-dashoffset:48;
    animation:stroke .4s ease forwards .8s;
}

.crossmark{
    width:100px;
    height:100px;
    display:block;
    margin:0 auto 15px;

    filter:
    drop-shadow(0 0 8px rgba(220,38,38,.5))
    drop-shadow(0 0 20px rgba(220,38,38,.3));
}

.crossmark-circle{
    stroke:#dc2626;
    stroke-width:2;
    stroke-miterlimit:10;
    stroke-dasharray:166;
    stroke-dashoffset:166;
    animation:stroke .8s ease forwards;
}

.crossmark-line{
    stroke:#dc2626;
    stroke-width:3;
    stroke-linecap:round;
    stroke-dasharray:40;
    stroke-dashoffset:40;
    animation:stroke .4s ease forwards .8s;
}


    

@keyframes stroke{
    to{
        stroke-dashoffset:0;
    }
}

.loading{
    text-align:center;
    color:#64748b;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

    <div class="logo-container">
        <img src="Logo Aljabar - Stoke.png" alt="Logo ALJABAR">
    </div>

    <h1>
        ALJABAR<br>
        Animal Lovers Jakarta Barat
    </h1>

    <div id="hasil" class="loading">
        Memverifikasi...
    </div>

</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycbwuCIi-40kfZDwvf0tC7M3E4Yl3g3S3HBcQG0ROEY9_JxBPl2BI_gzQrBDgIdz12E4owA/exec";

const params = new URLSearchParams(window.location.search);

const token = params.get("t");

console.log("Token:", token);

if(!token){

    document.getElementById("hasil").innerHTML = `
        <h2 class="invalid">
            ❌ Token tidak ditemukan
        </h2>
    `;

}else{

fetch(api + "?t=" + encodeURIComponent(token))

.then(response => response.json())

.then(data => {

    console.log(data);

    if(data.found){
   if(
    data.found &&
    data.status &&
    data.status.toLowerCase() === "aktif"
){

    document.getElementById("hasil").innerHTML = `

    <div class="success-animation">

        <svg class="checkmark"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 52 52">

            <circle
                class="checkmark-circle"
                cx="26"
                cy="26"
                r="25"
                fill="none"/>

        document.getElementById("hasil").innerHTML = `
            <path
                class="checkmark-check"
                fill="none"
                d="M14 27l7 7 17-17"/>

        <div class="success-animation">
        </svg>

            <svg class="checkmark"
                 xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 52 52">
        <h2 class="valid">
            Anggota Terverifikasi
        </h2>

                <circle
                    class="checkmark-circle"
                    cx="26"
                    cy="26"
                    r="25"
                    fill="none"/>
    </div>

                <path
                    class="checkmark-check"
                    fill="none"
                    d="M14 27l7 7 17-17"/>
    <div class="info">

            </svg>
        <div class="row">
            <b>Nama Anggota</b><br>
            ${data.nama}
        </div>

            <h2 class="valid">
                Anggota Terverifikasi
            </h2>
        <div class="row">
            <b>Status</b><br>
            ${data.status}
        </div>

        <div class="row">
            <b>Waktu Verifikasi</b><br>
            ${new Date().toLocaleString('id-ID')}
        </div>

        <div class="info">
    </div>

    `;

}else if(data.found){

    document.getElementById("hasil").innerHTML = `

    <div class="success-animation">

        <svg class="crossmark"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 52 52">

            <circle
                class="crossmark-circle"
                cx="26"
                cy="26"
                r="25"
                fill="none"/>

            <line
                class="crossmark-line"
                x1="16"
                y1="16"
                x2="36"
                y2="36"/>

            <line
                class="crossmark-line"
                x1="36"
                y1="16"
                x2="16"
                y2="36"/>

        </svg>

        <h2 class="invalid">
            Keanggotaan Tidak Aktif
        </h2>

            <div class="row">
                <b>Nama Anggota</b><br>
                ${data.nama}
            </div>
    </div>

            <div class="row">
                <b>Status</b><br>
                ${data.status}
            </div>
    <div class="info">

            <div class="row">
                <b>Waktu Verifikasi</b><br>
                ${new Date().toLocaleString('id-ID')}
            </div>
        <div class="row">
            <b>Nama Anggota</b><br>
            ${data.nama}
        </div>

        <div class="row">
            <b>Status</b><br>
            ${data.status}
        </div>
        `;

    }else{
        <div class="row">
            <b>Waktu Verifikasi</b><br>
            ${new Date().toLocaleString('id-ID')}
        </div>

        document.getElementById("hasil").innerHTML = `
            <h2 class="invalid">
                ❌ Tidak Terdaftar
            </h2>
    </div>

            <p style="margin-top:10px;">
                Data anggota tidak ditemukan.
            </p>
        `;
    `;

    }
}else{

    document.getElementById("hasil").innerHTML = `

    <div class="success-animation">

        <svg class="crossmark"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 52 52">

            <circle
                class="crossmark-circle"
                cx="26"
                cy="26"
                r="25"
                fill="none"/>

            <line
                class="crossmark-line"
                x1="16"
                y1="16"
                x2="36"
                y2="36"/>

            <line
                class="crossmark-line"
                x1="36"
                y1="16"
                x2="16"
                y2="36"/>

        </svg>

        <h2 class="invalid">
            Tidak Terdaftar
        </h2>

})
        <p style="margin-top:10px;">
            Data anggota tidak ditemukan.
        </p>

    </div>

    `;

}

.catch(error => {

    console.error(error);

    document.getElementById("hasil").innerHTML = `
        <h2 class="invalid">
            ❌ Gagal Terhubung ke Server
        </h2>

        <p style="margin-top:10px;">
            ${error.message}
        </p>
    `;

});

}

</script>

</body>
</html>
