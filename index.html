<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Verifikasi ALJABAR</title>

<style>

body{
margin:0;
background:#f4f7fb;
font-family:Segoe UI,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:500px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.1);
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.valid{
color:#16a34a;
}

.invalid{
color:#dc2626;
}

.info{
margin-top:20px;
text-align:left;
}

.row{
padding:12px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
ALJABAR
</div>

<div id="hasil">
Memverifikasi...
</div>

</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycbyE2cNHWv8tGROremMTUQzAhFgtWMb6loPs2yUv8iOZIBRoO0kooMS3sUEkpDp37U7G1w/exec";

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

fetch(api + "?id=" + id)

.then(res => res.json())

.then(data => {

if(data.found){

document.getElementById("hasil").innerHTML = `

<h2 class="valid">
✅ Anggota Terverifikasi
</h2>

<div class="info">

<div class="row">
<b>Nama</b><br>
${data.nama}
</div>

<div class="row">
<b>ID Anggota</b><br>
${data.id}
</div>

<div class="row">
<b>Status</b><br>
${data.status}
</div>

<div class="row">
<b>Waktu Verifikasi</b><br>
${new Date().toLocaleString('id-ID')}
</div>

</div>
`;

}else{

document.getElementById("hasil").innerHTML=`

<h2 class="invalid">
❌ Tidak Terdaftar
</h2>

<p>
Data anggota tidak ditemukan.
</p>
`;

}

});

</script>

</body>
</html>
