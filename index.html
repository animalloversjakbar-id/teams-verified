<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALJABAR Verification Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 550px;
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 120px;
            height: auto;
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 15px;
            color: #64748b;
            font-weight: 400;
        }

        .valid {
            color: #16a34a;
        }

        /* Warna baru khusus untuk status Tidak Aktif (Kuning/Oranye Tua) */
        .warning {
            color: #eab308; 
        }

        .invalid {
            color: #dc2626;
        }

        .info {
            margin-top: 20px;
        }

        .row {
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .success-animation {
            text-align: center;
            margin-bottom: 20px;
        }

        .checkmark {
            width: 100px;
            height: 100px;
            display: block;
            margin: 0 auto 15px;
            fill: none;
            filter: drop-shadow(0 0 8px rgba(34, 197, 94, .5)) drop-shadow(0 0 20px rgba(34, 197, 94, .3));
        }

        .checkmark-circle {
            stroke: #22c55e;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            animation: stroke .8s ease forwards;
        }

        .checkmark-check {
            stroke: #22c55e;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke .4s ease forwards .8s;
        }

        @keyframes stroke {
            to {
                stroke-dashoffset: 0;
            }
        }

        .loading {
            text-align: center;
            color: #64748b;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo-container">
            <img src="Logo Aljabar - Stoke.png" alt="Logo ALJABAR">
        </div>

        <h1>
            ALJABAR<br>
            <span class="subtitle">Animal Lovers Jakarta Barat</span>
        </h1>

        <div id="hasil" class="loading">
            Memverifikasi...
        </div>
    </div>

    <script>
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString()
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        const api = "https://script.google.com/macros/s/AKfycbwH9hfuk3nifyLrjbWA1Ai0d7PrN6OLg66pmuhtK0AiSZlxEuFsztIwn4Vd4zibaCYaVA/exec";
        const params = new URLSearchParams(window.location.search);
        const token = params.get("t");

        console.log("Token:", token);

        if (!token) {
            document.getElementById("hasil").innerHTML = `
                <h2 class="invalid">❌ Token tidak ditemukan</h2>
                <p style="margin-top:10px;">Gunakan link verifikasi resmi yang menyertakan token.</p>
            `;
        } else {
            fetch(api + "?t=" + encodeURIComponent(token))
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Respons server tidak menentu (Status: " + response.status + ")");
                    }
                    return response.json();
                })
                .then(data => {
                    console.log(data);

                    // 1. KONDISI: Data ditemukan di Google Sheets
                    if (data.found) {
                        
                        // Cek apakah statusnya AKTIF
                        if (data.status === "Aktif") {
                            document.getElementById("hasil").innerHTML = `
                                <div class="success-animation">
                                    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                                        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                                        <path class="checkmark-check" fill="none" d="M14 27l7 7 17-17"/>
                                    </svg>
                                    <h2 class="valid">Anggota Terverifikasi</h2>
                                </div>

                                <div class="info">
                                    <div class="row"><b>Nama Anggota</b><br>${escapeHTML(data.nama)}</div>
                                    <div class="row"><b>Status</b><br><span class="valid"><b>${escapeHTML(data.status)}</b></span></div>
                                    <div class="row"><b>Waktu Verifikasi</b><br>${new Date().toLocaleString('id-ID')}</div>
                                </div>
                            `;
                        
                        // Cek jika statusnya TIDAK AKTIF
                        } else if (data.status === "Tidak Aktif") {
                            document.getElementById("hasil").innerHTML = `
                                <div class="success-animation">
                                    <h2 class="warning">⚠️ Anggota Tidak Terverifikasi</h2>
                                    <p style="margin-top:10px; color:#64748b;">Masa keanggotaan Anda telah berakhir atau dinonaktifkan.</p>
                                </div>

                                <div class="info">
                                    <div class="row"><b>Nama Anggota</b><br>${escapeHTML(data.nama)}</div>
                                    <div class="row"><b>Status</b><br><span class="invalid"><b>${escapeHTML(data.status)}</b></span></div>
                                    <div class="row"><b>Waktu Verifikasi</b><br>${new Date().toLocaleString('id-ID')}</div>
                                </div>
                            `;
                        
                        // Antisipasi jika ada status lain selain Aktif / Tidak Aktif
                        } else {
                            document.getElementById("hasil").innerHTML = `
                                <h2 class="invalid">❌ Status Tidak Dikenali</h2>
                                <p style="margin-top:10px;">Status anggota: <b>${escapeHTML(data.status)}</b> tidak dapat diverifikasi.</p>
                            `;
                        }

                    // 2. KONDISI: Data TIDAK ditemukan sama sekali di Google Sheets
                    } else {
                        document.getElementById("hasil").innerHTML = `
                            <h2 class="invalid">❌ Tidak Terdaftar</h2>
                            <p style="margin-top:10px;">Data anggota tidak ditemukan di database kami.</p>
                        `;
                    }
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById("hasil").innerHTML = `
                        <h2 class="invalid">❌ Gagal Terhubung ke Server</h2>
                        <p style="margin-top:10px;">${escapeHTML(error.message)}</p>
                    `;
                });
        }
    </script>


<script>

  if (!token) {
    const pathParts = window.location.pathname.split("/");
    token = pathParts[pathParts.length - 1];

  // hapus parameter dari URL biar bersih
  window.history.replaceState({}, document.title, window.location.pathname);
</script>

    
</body>
</html>
