<script>

const api = "https://script.google.com/macros/s/AKfycbzxvHxBYyumKm2apETAbXv3pEGlttc79kKHl96t-k-Gpo1nUrQwr5VkCYyiguitFIWT_A/exec";

const hasil = document.getElementById("hasil");
const params = new URLSearchParams(window.location.search);
const token = params.get("t");

if (!token) {

    hasil.innerHTML = `
        <h2 class="invalid">❌ Token tidak ditemukan</h2>
    `;

} else {

    fetch(`${api}?t=${encodeURIComponent(token)}`)
        .then(response => {

            if (!response.ok) {
                throw new Error("Server merespons dengan error");
            }

            return response.json();
        })
        .then(data => {

            console.log("Response API:", data);

            const status = (data.status || "").trim().toLowerCase();

            // DATA DITEMUKAN DAN AKTIF
            if (data.found === true && status === "aktif") {

                hasil.innerHTML = `
                    <div class="success-animation">

                        <svg class="checkmark"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 52 52">

                            <circle
                                class="checkmark-circle"
                                cx="26"
                                cy="26"
                                r="25"
                                fill="none"/>

                            <path
                                class="checkmark-check"
                                fill="none"
                                d="M14 27l7 7 17-17"/>

                        </svg>

                        <h2 class="valid">
                            Anggota Terverifikasi
                        </h2>

                    </div>

                    <div class="info">

                        <div class="row">
                            <b>Nama Anggota</b><br>
                            ${data.nama || "-"}
                        </div>

                        <div class="row">
                            <b>Status</b><br>
                            ${data.status || "-"}
                        </div>

                        <div class="row">
                            <b>Waktu Verifikasi</b><br>
                            ${new Date().toLocaleString("id-ID")}
                        </div>

                    </div>
                `;

            }

            // DATA DITEMUKAN TAPI TIDAK AKTIF
            else if (data.found === true) {

                hasil.innerHTML = `
                    <div class="success-animation">

                        <svg class="crossmark"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 52 52">

                            <circle
                                class="crossmark-circle"
                                cx="26"
                                cy="26"
                                r="25"
                                fill="none"/>

                            <line
                                class="crossmark-line"
                                x1="16"
                                y1="16"
                                x2="36"
                                y2="36"/>

                            <line
                                class="crossmark-line"
                                x1="36"
                                y1="16"
                                x2="16"
                                y2="36"/>

                        </svg>

                        <h2 class="invalid">
                            Keanggotaan Tidak Aktif
                        </h2>

                    </div>

                    <div class="info">

                        <div class="row">
                            <b>Nama Anggota</b><br>
                            ${data.nama || "-"}
                        </div>

                        <div class="row">
                            <b>Status</b><br>
                            ${data.status || "-"}
                        </div>

                        <div class="row">
                            <b>Waktu Verifikasi</b><br>
                            ${new Date().toLocaleString("id-ID")}
                        </div>

                    </div>
                `;

            }

            // DATA TIDAK DITEMUKAN
            else {

                hasil.innerHTML = `
                    <div class="success-animation">

                        <svg class="crossmark"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 52 52">

                            <circle
                                class="crossmark-circle"
                                cx="26"
                                cy="26"
                                r="25"
                                fill="none"/>

                            <line
                                class="crossmark-line"
                                x1="16"
                                y1="16"
                                x2="36"
                                y2="36"/>

                            <line
                                class="crossmark-line"
                                x1="36"
                                y1="16"
                                x2="16"
                                y2="36"/>

                        </svg>

                        <h2 class="invalid">
                            Tidak Terdaftar
                        </h2>

                        <p style="margin-top:10px;">
                            Data anggota tidak ditemukan.
                        </p>

                    </div>
                `;

            }

        })
        .catch(error => {

            console.error(error);

            hasil.innerHTML = `
                <h2 class="invalid">
                    ❌ Gagal Terhubung ke Server
                </h2>

                <p style="margin-top:10px;">
                    ${error.message}
                </p>
            `;

        });
}

</script>
